<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Iron Log" />
  <title>Iron Log</title>

  <!-- React + Babel (UMD builds, no bundler needed) -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0A0A;
      --surface: #141414;
      --surface2: #1E1E1E;
      --border: #2A2A2A;
      --text: #F0F0F0;
      --muted: #666;
      --accent: #FF4D4D;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
    #root { height: 100%; }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      position: relative;
    }

    .header {
      padding: env(safe-area-inset-top, 44px) 20px 0;
      padding-top: max(env(safe-area-inset-top, 44px), 44px);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-inner { padding-bottom: 0; }
    .header-top { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
    .header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 1px; }
    .header-sub { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; letter-spacing: 1px; text-transform: uppercase; }

    .nav { display: flex; padding: 0 20px; margin-top: 12px; }
    .nav-btn {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 2px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 8px 4px;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn.active { color: var(--text); border-bottom-color: var(--accent); }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
      -webkit-overflow-scrolling: touch;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .card-emoji { font-size: 22px; }
    .card-title { font-size: 16px; font-weight: 600; flex: 1; }
    .card-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      color: var(--muted);
    }

    .color-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .exercise-list { display: flex; flex-direction: column; gap: 6px; }
    .exercise-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #AAA;
      padding: 6px 8px;
      background: var(--surface2);
      border-radius: 6px;
    }
    .exercise-row-name { flex: 1; }
    .exercise-num { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); width: 16px; text-align: right; }

    .btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: 0.75; }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-sm { padding: 6px 10px; font-size: 10px; }
    .btn-danger { background: #3A1414; color: #FF6B6B; border: 1px solid #5A2020; }
    .btn-green { background: #1A3A1A; color: #4DFF91; border: 1px solid #2A5A2A; }

    .fab {
      position: fixed;
      bottom: calc(28px + env(safe-area-inset-bottom, 0px));
      right: 50%;
      transform: translateX(175px);
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      border: none;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(255,77,77,0.4);
      z-index: 100;
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
    }
    .fab:active { transform: translateX(175px) scale(0.93); }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      animation: fadeIn 0.15s ease;
    }
    .modal {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
      padding: 20px 20px calc(28px + env(safe-area-inset-bottom, 0px));
      animation: slideUp 0.22s ease;
      max-height: 92vh;
      max-height: 92dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }

    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
    .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; margin-bottom: 20px; }

    .form-group { margin-bottom: 14px; }
    .form-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 6px; }
    .form-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px; /* 16px prevents iOS zoom */
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-row { display: flex; gap: 8px; }
    .form-row .form-group { flex: 1; }

    .color-options { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s; }
    .color-swatch.selected { border-color: white; transform: scale(1.15); }

    .set-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: var(--surface2);
      border-radius: 8px;
      margin-bottom: 6px;
      border: 1px solid var(--border);
    }
    .set-num { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--accent); width: 24px; text-align: center; flex-shrink: 0; }
    .set-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 16px; /* 16px prevents iOS zoom */
      outline: none;
      text-align: center;
      min-width: 0;
      -webkit-appearance: none;
    }
    .set-input:focus { border-color: var(--accent); }
    .set-label { font-size: 10px; color: var(--muted); text-align: center; font-family: 'DM Mono', monospace; letter-spacing: 0.5px; }

    .log-entry { margin-bottom: 16px; }
    .log-date {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .log-date::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .log-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 8px; }
    .log-card-header { padding: 12px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .log-card-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
    .log-exercise-name { font-size: 13px; font-weight: 600; margin-bottom: 5px; }
    .log-sets { display: flex; gap: 6px; flex-wrap: wrap; }
    .log-set-chip { font-family: 'DM Mono', monospace; font-size: 11px; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: 3px 7px; color: #AAA; }
    .color-bar { width: 3px; border-radius: 2px; align-self: stretch; flex-shrink: 0; }

    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #444; margin-bottom: 6px; }
    .empty-sub { font-size: 13px; }

    .row-actions { display: flex; gap: 6px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.5px; }
    .divider { height: 1px; background: var(--border); margin: 16px 0; }

    select.form-input { background-image: none; }

    .reorder-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: color 0.1s, background 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .reorder-btn:active { color: var(--text); background: var(--border); }
    .reorder-btn:disabled { opacity: 0.2; pointer-events: none; }
    .reorder-btns { display: flex; flex-direction: column; gap: 1px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const COLORS = ["#FF4D4D","#FF9A3C","#FFD34D","#4DFF91","#4D9FFF","#B44DFF","#FF4DA6","#FFFFFF"];

    const SAMPLE_TEMPLATES = [
      { id: "t1", name: "Push Day", emoji: "💪", color: "#FF4D4D",
        exercises: [{id:"e1",name:"Bench Press"},{id:"e2",name:"Overhead Press"},{id:"e3",name:"Lateral Raises"},{id:"e4",name:"Tricep Pushdowns"}] },
      { id: "t2", name: "Pull Day", emoji: "🏋️", color: "#4D9FFF",
        exercises: [{id:"e5",name:"Deadlift"},{id:"e6",name:"Pull-Ups"},{id:"e7",name:"Barbell Row"},{id:"e8",name:"Bicep Curls"}] },
      { id: "t3", name: "Leg Day", emoji: "🦵", color: "#4DFF91",
        exercises: [{id:"e9",name:"Squat"},{id:"e10",name:"Romanian Deadlift"},{id:"e11",name:"Leg Press"},{id:"e12",name:"Calf Raises"}] },
    ];

    const uid = () => Math.random().toString(36).slice(2, 9);

    const loadData = (key, fallback) => {
      try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : fallback; }
      catch { return fallback; }
    };
    const saveData = (key, data) => { try { localStorage.setItem(key, JSON.stringify(data)); } catch {} };

    function formatDate(iso) {
      const d = new Date(iso + "T00:00:00");
      const todayStr = new Date().toISOString().slice(0,10);
      const yest = new Date(); yest.setDate(yest.getDate()-1);
      const yesterdayStr = yest.toISOString().slice(0,10);
      if (iso === todayStr) return "Today";
      if (iso === yesterdayStr) return "Yesterday";
      return d.toLocaleDateString("en-US", {weekday:"long", month:"short", day:"numeric"});
    }

    // ── Template Modal ──────────────────────────────────────────────────────
    function TemplateModal({ initial, onSave, onClose }) {
      const [name, setName] = useState(initial?.name || "");
      const [emoji, setEmoji] = useState(initial?.emoji || "💪");
      const [color, setColor] = useState(initial?.color || COLORS[0]);
      const [exercises, setExercises] = useState(initial?.exercises || []);
      const [newEx, setNewEx] = useState("");

      const addExercise = () => {
        const t = newEx.trim(); if (!t) return;
        setExercises([...exercises, {id:uid(), name:t}]); setNewEx("");
      };

      const moveExercise = (i, dir) => {
        const j = i + dir;
        if (j < 0 || j >= exercises.length) return;
        const next = [...exercises];
        [next[i], next[j]] = [next[j], next[i]];
        setExercises(next);
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-handle" />
            <div className="modal-title">{initial ? "EDIT TEMPLATE" : "NEW TEMPLATE"}</div>

            <div className="form-row">
              <div className="form-group" style={{flex:"0 0 64px"}}>
                <label className="form-label">Icon</label>
                <input className="form-input" value={emoji} onChange={e=>setEmoji(e.target.value)} maxLength={2} style={{textAlign:"center",fontSize:20,padding:"8px 4px"}} />
              </div>
              <div className="form-group">
                <label className="form-label">Name</label>
                <input className="form-input" placeholder="Push Day" value={name} onChange={e=>setName(e.target.value)} />
              </div>
            </div>

            <div className="form-group">
              <label className="form-label">Color</label>
              <div className="color-options">
                {COLORS.map(c => <div key={c} className={`color-swatch ${color===c?"selected":""}`} style={{background:c}} onClick={()=>setColor(c)} />)}
              </div>
            </div>

            <div className="divider" />
            <div style={{fontFamily:"DM Mono",fontSize:11,letterSpacing:1,textTransform:"uppercase",color:"var(--muted)",marginBottom:10}}>Exercises</div>

            <div className="exercise-list" style={{marginBottom:10}}>
              {exercises.map((ex,i) => (
                <div className="exercise-row" key={ex.id}>
                  <span className="exercise-num">{i+1}</span>
                  <div className="color-dot" style={{background:color}} />
                  <span className="exercise-row-name">{ex.name}</span>
                  <div className="reorder-btns">
                    <button className="reorder-btn" disabled={i===0} onClick={()=>moveExercise(i,-1)} title="Move up">▲</button>
                    <button className="reorder-btn" disabled={i===exercises.length-1} onClick={()=>moveExercise(i,1)} title="Move down">▼</button>
                  </div>
                  <button onClick={()=>setExercises(exercises.filter(e=>e.id!==ex.id))} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:18,lineHeight:1,padding:"0 4px"}}>×</button>
                </div>
              ))}
            </div>

            <div className="form-row" style={{alignItems:"flex-end"}}>
              <div className="form-group" style={{marginBottom:0}}>
                <input className="form-input" placeholder="Exercise name..." value={newEx}
                  onChange={e=>setNewEx(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&addExercise()} />
              </div>
              <button className="btn btn-ghost btn-sm" style={{height:42,flexShrink:0}} onClick={addExercise}>Add</button>
            </div>

            <div className="divider" />
            <div className="row-actions">
              <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>Cancel</button>
              <button className="btn" style={{flex:1}} onClick={()=>{ if(!name.trim()) return; onSave({id:initial?.id,name:name.trim(),emoji,color,exercises}); }}>Save</button>
            </div>
          </div>
        </div>
      );
    }

    // ── Workout Modal ───────────────────────────────────────────────────────
    function WorkoutModal({ templates, initialTemplateId, editLog, onSave, onClose }) {
      const today = new Date().toISOString().slice(0,10);
      const [selTmplId, setSelTmplId] = useState(editLog?.templateId || initialTemplateId);
      const [date, setDate] = useState(editLog?.date || today);
      const tmpl = templates.find(t=>t.id===selTmplId) || templates[0];

      const initExercises = () => editLog
        ? editLog.exercises
        : (tmpl?.exercises||[]).map(ex=>({...ex, sets:[{weight:"",reps:""}]}));
      const [exercises, setExercises] = useState(initExercises);

      const handleSelectTemplate = (id) => {
        setSelTmplId(id);
        const t = templates.find(x=>x.id===id);
        setExercises((t?.exercises||[]).map(ex=>({...ex,sets:[{weight:"",reps:""}]})));
      };

      const updateSet = (ei,si,field,val) =>
        setExercises(prev=>prev.map((ex,i)=>i!==ei?ex:{...ex,sets:ex.sets.map((s,j)=>j!==si?s:{...s,[field]:val})}));

      const addSet = (ei) =>
        setExercises(prev=>prev.map((ex,i)=>{
          if(i!==ei) return ex;
          const last=ex.sets[ex.sets.length-1]||{weight:"",reps:""};
          return {...ex,sets:[...ex.sets,{...last}]};
        }));

      const removeSet = (ei,si) =>
        setExercises(prev=>prev.map((ex,i)=>i!==ei?ex:{...ex,sets:ex.sets.filter((_,j)=>j!==si)}));

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-handle" />
            <div className="modal-title">{editLog ? "EDIT WORKOUT" : "LOG WORKOUT"}</div>

            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Template</label>
                <select className="form-input" value={selTmplId} onChange={e=>handleSelectTemplate(e.target.value)}>
                  {templates.map(t=><option key={t.id} value={t.id}>{t.emoji} {t.name}</option>)}
                </select>
              </div>
              <div className="form-group" style={{flex:"0 0 148px"}}>
                <label className="form-label">Date</label>
                <input className="form-input" type="date" value={date} onChange={e=>setDate(e.target.value)} />
              </div>
            </div>

            <div className="divider" />

            {exercises.map((ex,ei)=>(
              <div key={ex.id} style={{marginBottom:18}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <div className="color-dot" style={{background:tmpl?.color||"#FF4D4D"}} />
                  <span style={{fontWeight:600,fontSize:14,flex:1}}>{ex.name}</span>
                  <button className="btn btn-green btn-sm" onClick={()=>addSet(ei)}>+ Set</button>
                </div>
                <div style={{display:"flex",gap:8,marginBottom:4,paddingLeft:16}}>
                  <span className="set-label" style={{flex:"0 0 24px"}}>#</span>
                  <span className="set-label" style={{flex:1}}>KG</span>
                  <span className="set-label" style={{flex:1}}>REPS</span>
                  <span style={{width:28}} />
                </div>
                {ex.sets.map((s,si)=>(
                  <div className="set-row" key={si}>
                    <span className="set-num">{si+1}</span>
                    <input className="set-input" type="number" inputMode="decimal" placeholder="0" value={s.weight} onChange={e=>updateSet(ei,si,"weight",e.target.value)} />
                    <input className="set-input" type="number" inputMode="numeric" placeholder="0" value={s.reps} onChange={e=>updateSet(ei,si,"reps",e.target.value)} />
                    <button onClick={()=>removeSet(ei,si)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:20,lineHeight:1,width:28,textAlign:"center"}}>×</button>
                  </div>
                ))}
              </div>
            ))}

            <div className="divider" />
            <div className="row-actions">
              <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>Cancel</button>
              <button className="btn" style={{flex:1}} onClick={()=>onSave({id:editLog?.id||uid(),templateId:selTmplId,date,exercises})}>Save</button>
            </div>
          </div>
        </div>
      );
    }

    // ── Main App ────────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState("log");
      const [templates, setTemplates] = useState(()=>loadData("wt_templates", SAMPLE_TEMPLATES));
      const [logs, setLogs] = useState(()=>loadData("wt_logs", []));
      const [templateModal, setTemplateModal] = useState(null);
      const [workoutModal, setWorkoutModal] = useState(null);
      const [viewLog, setViewLog] = useState(null);

      const saveTemplates = t => { setTemplates(t); saveData("wt_templates", t); };
      const saveLogs = l => { setLogs(l); saveData("wt_logs", l); };

      const handleSaveTemplate = tmpl => {
        if (tmpl.id && templates.find(t=>t.id===tmpl.id))
          saveTemplates(templates.map(t=>t.id===tmpl.id?tmpl:t));
        else
          saveTemplates([...templates, {...tmpl, id:uid()}]);
        setTemplateModal(null);
      };

      const handleSaveWorkout = workout => {
        if (workout.id && logs.find(l=>l.id===workout.id))
          saveLogs(logs.map(l=>l.id===workout.id?workout:l));
        else
          saveLogs([workout, ...logs]);
        setWorkoutModal(null);
      };

      const groupedLogs = logs.reduce((acc,log)=>{ (acc[log.date]||(acc[log.date]=[])).push(log); return acc; }, {});
      const sortedDates = Object.keys(groupedLogs).sort((a,b)=>b.localeCompare(a));

      return (
        <>
          <div className="app">
            {/* Header */}
            <div className="header">
              <div className="header-inner">
                <div className="header-top">
                  <h1>IRON LOG</h1>
                  <span className="header-sub">v1.0</span>
                </div>
                <div className="nav">
                  <button className={`nav-btn ${tab==="log"?"active":""}`} onClick={()=>setTab("log")}>Workouts</button>
                  <button className={`nav-btn ${tab==="templates"?"active":""}`} onClick={()=>setTab("templates")}>Templates</button>
                </div>
              </div>
            </div>

            {/* Content */}
            <div className="content">
              {tab === "templates" && (
                <>
                  <div className="section-header">
                    <span className="section-title">MY TEMPLATES</span>
                    <button className="btn btn-sm" onClick={()=>setTemplateModal({mode:"new"})}>+ NEW</button>
                  </div>
                  {templates.length === 0 && (
                    <div className="empty">
                      <div className="empty-icon">📋</div>
                      <div className="empty-title">No Templates Yet</div>
                      <div className="empty-sub">Create your first workout template</div>
                    </div>
                  )}
                  {templates.map(tmpl=>(
                    <div className="card" key={tmpl.id}>
                      <div className="card-header">
                        <span className="card-emoji">{tmpl.emoji}</span>
                        <span className="card-title">{tmpl.name}</span>
                        <span className="card-badge">{tmpl.exercises.length} exercises</span>
                      </div>
                      <div className="exercise-list">
                        {tmpl.exercises.map((ex,i)=>(
                          <div className="exercise-row" key={ex.id}>
                            <span className="exercise-num">{i+1}</span>
                            <div className="color-dot" style={{background:tmpl.color}} />
                            <span className="exercise-row-name">{ex.name}</span>
                          </div>
                        ))}
                      </div>
                      <div className="divider" />
                      <div className="row-actions">
                        <button className="btn btn-ghost btn-sm" onClick={()=>setTemplateModal({mode:"edit",data:tmpl})}>Edit</button>
                        <button className="btn btn-ghost btn-sm" onClick={()=>setWorkoutModal({templateId:tmpl.id})}>Start Workout</button>
                        <button className="btn btn-danger btn-sm" onClick={()=>saveTemplates(templates.filter(t=>t.id!==tmpl.id))}>Delete</button>
                      </div>
                    </div>
                  ))}
                </>
              )}

              {tab === "log" && (
                <>
                  <div className="section-header">
                    <span className="section-title">WORKOUT LOG</span>
                    {templates.length > 0 && <button className="btn btn-sm" onClick={()=>setWorkoutModal({templateId:templates[0].id})}>+ LOG</button>}
                  </div>
                  {sortedDates.length === 0 && (
                    <div className="empty">
                      <div className="empty-icon">🏋️</div>
                      <div className="empty-title">No Workouts Yet</div>
                      <div className="empty-sub">Start a workout from your templates</div>
                    </div>
                  )}
                  {sortedDates.map(date=>(
                    <div className="log-entry" key={date}>
                      <div className="log-date">{formatDate(date)}</div>
                      {groupedLogs[date].map(log=>{
                        const tmpl = templates.find(t=>t.id===log.templateId);
                        const expanded = viewLog === log.id;
                        return (
                          <div className="log-card" key={log.id}>
                            <div className="log-card-header" onClick={()=>setViewLog(expanded?null:log.id)}>
                              <div className="color-bar" style={{background:tmpl?.color||"#666"}} />
                              <span style={{fontSize:18}}>{tmpl?.emoji||"🏋️"}</span>
                              <span style={{flex:1,fontWeight:600,fontSize:15}}>{tmpl?.name||"Workout"}</span>
                              <span style={{fontFamily:"DM Mono",fontSize:11,color:"var(--muted)"}}>{log.exercises?.length||0} ex</span>
                              <span style={{color:"var(--muted)",marginLeft:8,fontSize:12}}>{expanded?"▲":"▼"}</span>
                            </div>
                            {expanded && (
                              <div className="log-card-body">
                                {(log.exercises||[]).map(ex=>(
                                  <div key={ex.id}>
                                    <div className="log-exercise-name">{ex.name}</div>
                                    <div className="log-sets">
                                      {(ex.sets||[]).map((s,i)=>(
                                        <span className="log-set-chip" key={i}>{s.weight}kg × {s.reps}</span>
                                      ))}
                                      {(!ex.sets||ex.sets.length===0) && <span style={{fontSize:12,color:"var(--muted)"}}>No sets</span>}
                                    </div>
                                  </div>
                                ))}
                                <div className="row-actions" style={{marginTop:4}}>
                                  <button className="btn btn-ghost btn-sm" onClick={()=>setWorkoutModal({templateId:log.templateId,editLog:log})}>Edit</button>
                                  <button className="btn btn-danger btn-sm" onClick={()=>{saveLogs(logs.filter(l=>l.id!==log.id));setViewLog(null);}}>Delete</button>
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  ))}
                </>
              )}
            </div>

            {/* FAB */}
            {tab==="log" && templates.length>0 && <button className="fab" onClick={()=>setWorkoutModal({templateId:templates[0].id})}>+</button>}
            {tab==="templates" && <button className="fab" onClick={()=>setTemplateModal({mode:"new"})}>+</button>}
          </div>

          {/* Modals */}
          {templateModal && <TemplateModal initial={templateModal.data} onSave={handleSaveTemplate} onClose={()=>setTemplateModal(null)} />}
          {workoutModal && <WorkoutModal templates={templates} initialTemplateId={workoutModal.templateId} editLog={workoutModal.editLog} onSave={handleSaveWorkout} onClose={()=>setWorkoutModal(null)} />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
