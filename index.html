<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Iron Log" />
  <title>Iron Log</title>

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0A0A0A; --surface: #141414; --surface2: #1E1E1E;
      --border: #2A2A2A; --text: #F0F0F0; --muted: #666; --accent: #FF4D4D;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
    #root { height: 100%; }
    .app { max-width: 430px; margin: 0 auto; min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; background: var(--bg); }
    .header { padding: env(safe-area-inset-top,44px) 20px 0; padding-top: max(env(safe-area-inset-top,44px),44px); border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 10; }
    .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 1px; }
    .header-sub { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; letter-spacing: 1px; text-transform: uppercase; }
    .sync-pill { margin-left: auto; display: flex; align-items: center; gap: 5px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 8px; }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .nav { display: flex; padding: 0 20px; margin-top: 12px; }
    .nav-btn { flex: 1; background: none; border: none; border-bottom: 2px solid var(--border); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; padding: 8px 4px; cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
    .nav-btn.active { color: var(--text); border-bottom-color: var(--accent); }
    .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: calc(80px + env(safe-area-inset-bottom,0px)); -webkit-overflow-scrolling: touch; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .card-emoji { font-size: 22px; }
    .card-title { font-size: 16px; font-weight: 600; flex: 1; }
    .card-badge { font-family: 'DM Mono', monospace; font-size: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; color: var(--muted); }
    .color-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .exercise-list { display: flex; flex-direction: column; gap: 6px; }
    .exercise-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #AAA; padding: 6px 8px; background: var(--surface2); border-radius: 6px; }
    .exercise-row-name { flex: 1; }
    .exercise-num { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); width: 16px; text-align: right; }
    .btn { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 10px 16px; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: opacity 0.15s; -webkit-tap-highlight-color: transparent; }
    .btn:active { opacity: 0.75; }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-sm { padding: 6px 10px; font-size: 10px; }
    .btn-danger { background: #3A1414; color: #FF6B6B; border: 1px solid #5A2020; }
    .btn-green { background: #1A3A1A; color: #4DFF91; border: 1px solid #2A5A2A; }
    .fab { position: fixed; bottom: calc(28px + env(safe-area-inset-bottom,0px)); right: 50%; transform: translateX(175px); width: 52px; height: 52px; border-radius: 50%; background: var(--accent); color: white; border: none; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(255,77,77,0.4); z-index: 100; -webkit-tap-highlight-color: transparent; line-height: 1; }
    .fab:active { transform: translateX(175px) scale(0.93); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: flex; align-items: flex-end; animation: fadeIn 0.15s ease; }
    .modal { width: 100%; max-width: 430px; margin: 0 auto; background: var(--surface); border-radius: 20px 20px 0 0; border: 1px solid var(--border); border-bottom: none; padding: 20px 20px calc(28px + env(safe-area-inset-bottom,0px)); animation: slideUp 0.22s ease; max-height: 92vh; max-height: 92dvh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    @keyframes fadeIn { from{opacity:0}to{opacity:1} }
    @keyframes slideUp { from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1} }
    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
    .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    .form-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 6px; }
    .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; outline: none; -webkit-appearance: none; appearance: none; }
    .form-input:focus { border-color: var(--accent); }
    .form-row { display: flex; gap: 8px; }
    .form-row .form-group { flex: 1; }
    .color-options { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s; }
    .color-swatch.selected { border-color: white; transform: scale(1.15); }
    .set-row { display: flex; align-items: center; gap: 8px; padding: 8px; background: var(--surface2); border-radius: 8px; margin-bottom: 6px; border: 1px solid var(--border); }
    .set-num { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--accent); width: 24px; text-align: center; flex-shrink: 0; }
    .set-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 16px; outline: none; text-align: center; min-width: 0; -webkit-appearance: none; }
    .set-input:focus { border-color: var(--accent); }
    .set-label { font-size: 10px; color: var(--muted); text-align: center; font-family: 'DM Mono', monospace; letter-spacing: 0.5px; }
    .log-entry { margin-bottom: 16px; }
    .log-date { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .log-date::after { content:''; flex:1; height:1px; background:var(--border); }
    .log-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 8px; }
    .log-card-header { padding: 12px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .log-card-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
    .log-exercise-name { font-size: 13px; font-weight: 600; margin-bottom: 5px; }
    .log-sets { display: flex; gap: 6px; flex-wrap: wrap; }
    .log-set-chip { font-family: 'DM Mono', monospace; font-size: 11px; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: 3px 7px; color: #AAA; }
    .color-bar { width: 3px; border-radius: 2px; align-self: stretch; flex-shrink: 0; }
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #444; margin-bottom: 6px; }
    .empty-sub { font-size: 13px; line-height: 1.6; }
    .row-actions { display: flex; gap: 6px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.5px; }
    .divider { height: 1px; background: var(--border); margin: 16px 0; }
    select.form-input { background-image: none; }
    .reorder-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; padding: 2px 3px; display: flex; align-items: center; justify-content: center; border-radius: 4px; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .reorder-btn:active { color: var(--text); background: var(--border); }
    .reorder-btn:disabled { opacity: 0.2; pointer-events: none; }
    .reorder-btns { display: flex; flex-direction: column; gap: 1px; flex-shrink: 0; }
    .notes-area { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; outline: none; resize: none; min-height: 80px; line-height: 1.5; -webkit-appearance: none; }
    .notes-area:focus { border-color: var(--accent); }
    .notes-display { font-size: 13px; color: #AAA; line-height: 1.6; background: var(--surface2); border-radius: 8px; padding: 10px 12px; border: 1px solid var(--border); white-space: pre-wrap; word-break: break-word; }
    /* Full-screen modal */
    .screen-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: flex; flex-direction: column; animation: screenIn 0.2s ease; overflow: hidden; }
    @keyframes screenIn { from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)} }
    .screen-header { padding: max(env(safe-area-inset-top,44px),44px) 20px 0; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
    .screen-header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .screen-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; flex: 1; }
    .screen-body { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: calc(80px + env(safe-area-inset-bottom,0px)); -webkit-overflow-scrolling: touch; }
    .screen-footer { padding: 12px 20px calc(max(env(safe-area-inset-bottom,0px),16px) + 12px); border-top: 1px solid var(--border); background: var(--bg); flex-shrink: 0; display: flex; gap: 8px; }
    /* Custom picker */
    .picker-list { display: flex; flex-direction: column; gap: 6px; }
    .picker-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 14px; -webkit-tap-highlight-color: transparent; transition: border-color 0.1s; }
    .picker-item:active { border-color: var(--accent); }
    .picker-item-name { flex: 1; }
    .picker-item-custom { color: var(--muted); font-style: italic; }
    .metric-toggle { display: flex; gap: 4px; }
    .metric-btn { flex: 1; padding: 5px 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; text-align: center; -webkit-tap-highlight-color: transparent; transition: all 0.1s; }
    .metric-btn.active { background: var(--surface); color: var(--text); border-color: #444; }
    /* Setup */
    .setup { max-width: 430px; margin: 0 auto; padding: max(env(safe-area-inset-top,44px),44px) 24px 48px; min-height: 100vh; display: flex; flex-direction: column; }
    .setup-logo { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 2px; margin-bottom: 2px; }
    .setup-tagline { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 36px; }
    .setup-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 14px; }
    .setup-card-title { font-family: 'Bebas Neue', sans-serif; font-size: 17px; margin-bottom: 8px; }
    .setup-body { font-size: 13px; color: #AAA; line-height: 1.65; margin-bottom: 14px; }
    .setup-body code { font-family: 'DM Mono', monospace; font-size: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; color: var(--text); }
    .setup-step { display: flex; gap: 10px; margin-bottom: 10px; font-size: 13px; color: #AAA; line-height: 1.5; }
    .setup-step-num { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--accent); flex-shrink: 0; width: 20px; line-height: 1.2; }
    .error-box { background: #3A1414; border: 1px solid #5A2020; border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #FF6B6B; margin-bottom: 14px; line-height: 1.5; }
    .info-box { background: #101E2E; border: 1px solid #1A3A5A; border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #7ABFFF; margin-top: 14px; line-height: 1.5; }
    /* Spinner */
    .spinner { display: inline-block; border-radius: 50%; border-style: solid; border-color: var(--border); border-top-color: var(--accent); animation: spin 0.7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useCallback, useRef } = React;

  const COLORS = ["#FF4D4D","#FF9A3C","#FFD34D","#4DFF91","#4D9FFF","#B44DFF","#FF4DA6","#FFFFFF"];
  const SAMPLE_TEMPLATES = [
    { id:"t1", name:"Push Day", emoji:"💪", color:"#FF4D4D",
      exercises:[{id:"e1",name:"Bench Press"},{id:"e2",name:"Overhead Press"},{id:"e3",name:"Lateral Raises"},{id:"e4",name:"Tricep Pushdowns"}] },
    { id:"t2", name:"Pull Day", emoji:"🏋️", color:"#4D9FFF",
      exercises:[{id:"e5",name:"Deadlift"},{id:"e6",name:"Pull-Ups"},{id:"e7",name:"Barbell Row"},{id:"e8",name:"Bicep Curls"}] },
    { id:"t3", name:"Leg Day", emoji:"🦵", color:"#4DFF91",
      exercises:[{id:"e9",name:"Squat"},{id:"e10",name:"Romanian Deadlift"},{id:"e11",name:"Leg Press"},{id:"e12",name:"Calf Raises"}] },
  ];
  const uid = () => Math.random().toString(36).slice(2,9);
  const LS_TOKEN = "ironlog_gh_token";
  const LS_REPO  = "ironlog_gh_repo";
  const LS_DRAFT = "ironlog_draft";
  const DATA_FILE = "ironlog-data.json";

  // ── GitHub API ─────────────────────────────────────────────────────────
  async function ghRead(repo, token) {
    const res = await fetch(`https://api.github.com/repos/${repo}/contents/${DATA_FILE}`, {
      headers: { Authorization:`token ${token}`, Accept:"application/vnd.github.v3+json" }
    });
    if (res.status === 404) return null;
    if (!res.ok) {
      const txt = await res.text();
      throw new Error(`GitHub ${res.status}: ${txt}`);
    }
    const json = await res.json();
    const bytes = Uint8Array.from(atob(json.content.replace(/\n/g,"")), c => c.charCodeAt(0));
    const content = JSON.parse(new TextDecoder().decode(bytes));
    return { content, sha: json.sha };
  }

  async function ghWrite(repo, token, data, sha) {
    const res = await fetch(`https://api.github.com/repos/${repo}/contents/${DATA_FILE}`, {
      method: "PUT",
      headers: { Authorization:`token ${token}`, "Content-Type":"application/json", Accept:"application/vnd.github.v3+json" },
      body: JSON.stringify({
        message: `ironlog: save ${new Date().toISOString().slice(0,10)}`,
        content: btoa(String.fromCharCode(...new TextEncoder().encode(JSON.stringify(data, null, 2)))),
        ...(sha ? { sha } : {})
      })
    });
    if (!res.ok) {
      const txt = await res.text();
      throw new Error(`GitHub write ${res.status}: ${txt}`);
    }
    const json = await res.json();
    return json.content.sha;
  }

  // ── Setup Screen ───────────────────────────────────────────────────────
  function SetupScreen({ onComplete }) {
    const [token,   setToken]   = useState("");
    const [repo,    setRepo]    = useState("");
    const [loading, setLoading] = useState(false);
    const [error,   setError]   = useState("");

    const connect = async () => {
      const t=token.trim(), r=repo.trim();
      if (!t||!r) { setError("Please fill in both fields."); return; }
      if (!r.includes("/")) { setError('Repo must be "username/reponame" — e.g. dansmith/iron-log'); return; }
      setLoading(true); setError("");
      try {
        const res = await fetch(`https://api.github.com/repos/${r}`, { headers:{ Authorization:`token ${t}` } });
        if (res.status===401) throw new Error("Token rejected. Check that it hasn't expired.");
        if (res.status===404) throw new Error("Repo not found. Check the name and that the token has 'repo' scope.");
        if (!res.ok) throw new Error(`GitHub error ${res.status}`);
        localStorage.setItem(LS_TOKEN, t);
        localStorage.setItem(LS_REPO,  r);
        onComplete(t, r);
      } catch(e) { setError(e.message); }
      finally { setLoading(false); }
    };

    return (
      <div className="setup">
        <div className="setup-logo">IRON LOG</div>
        <div className="setup-tagline">Connect GitHub to save workouts</div>

        <div className="setup-card">
          <div className="setup-card-title">Step 1 — Create a token</div>
          <div className="setup-step"><span className="setup-step-num">1</span><span>Go to <strong>github.com → Settings → Developer settings → Personal access tokens → Tokens (classic)</strong></span></div>
          <div className="setup-step"><span className="setup-step-num">2</span><span>Click <strong>Generate new token (classic)</strong>. Name it "Iron Log". Set expiration to <strong>No expiration</strong>. Check the <code>repo</code> scope only.</span></div>
          <div className="setup-step"><span className="setup-step-num">3</span><span>Click <strong>Generate token</strong> and copy it — you won't see it again.</span></div>
        </div>

        {error && <div className="error-box">⚠️ {error}</div>}

        <div className="setup-card">
          <div className="setup-card-title">Step 2 — Enter your details</div>
          <div className="form-group">
            <label className="form-label">Personal Access Token</label>
            <input className="form-input" type="password" placeholder="ghp_xxxxxxxxxxxxxxxx" value={token} onChange={e=>setToken(e.target.value)} autoComplete="off" autoCorrect="off" autoCapitalize="none" spellCheck="false"/>
          </div>
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">Repository (username/reponame)</label>
            <input className="form-input" placeholder="dansmith/iron-log" value={repo} onChange={e=>setRepo(e.target.value)} autoCorrect="off" autoCapitalize="none" spellCheck="false" onKeyDown={e=>e.key==="Enter"&&connect()}/>
          </div>
        </div>

        <button className="btn" style={{width:"100%",justifyContent:"center",display:"flex",alignItems:"center",gap:8,opacity:loading?0.7:1}} onClick={connect} disabled={loading}>
          {loading && <span className="spinner" style={{width:14,height:14,borderWidth:2}}/>}
          {loading ? "Connecting…" : "Connect & Start →"}
        </button>

        <div className="info-box">
          🔒 Your token is stored only in this browser's local storage and sent only to the GitHub API — never anywhere else.
        </div>
      </div>
    );
  }

  // ── Template Modal ─────────────────────────────────────────────────────
  function TemplateModal({ initial, onSave, onClose }) {
    const [name,      setName]      = useState(initial?.name||"");
    const [emoji,     setEmoji]     = useState(initial?.emoji||"💪");
    const [color,     setColor]     = useState(initial?.color||COLORS[0]);
    const [exercises, setExercises] = useState(initial?.exercises||[]);
    const [newEx,     setNewEx]     = useState("");
    const [newMetric, setNewMetric] = useState("weight"); // 'weight' | 'time'

    const addExercise = () => { const t=newEx.trim(); if(!t) return; setExercises([...exercises,{id:uid(),name:t,metric:newMetric}]); setNewEx(""); setNewMetric("weight"); };
    const moveExercise = (i,dir) => {
      const j=i+dir; if(j<0||j>=exercises.length) return;
      const n=[...exercises]; [n[i],n[j]]=[n[j],n[i]]; setExercises(n);
    };

    return (
      <div className="modal-overlay" onClick={onClose}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="modal-handle"/>
          <div className="modal-title">{initial?"EDIT TEMPLATE":"NEW TEMPLATE"}</div>
          <div className="form-row">
            <div className="form-group" style={{flex:"0 0 64px"}}>
              <label className="form-label">Icon</label>
              <input className="form-input" value={emoji} onChange={e=>setEmoji(e.target.value)} maxLength={2} style={{textAlign:"center",fontSize:20,padding:"8px 4px"}}/>
            </div>
            <div className="form-group">
              <label className="form-label">Name</label>
              <input className="form-input" placeholder="Push Day" value={name} onChange={e=>setName(e.target.value)}/>
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Color</label>
            <div className="color-options">{COLORS.map(c=><div key={c} className={`color-swatch ${color===c?"selected":""}`} style={{background:c}} onClick={()=>setColor(c)}/>)}</div>
          </div>
          <div className="divider"/>
          <div style={{fontFamily:"DM Mono",fontSize:11,letterSpacing:1,textTransform:"uppercase",color:"var(--muted)",marginBottom:10}}>Exercises</div>
          <div className="exercise-list" style={{marginBottom:10}}>
            {exercises.map((ex,i)=>(
              <div className="exercise-row" key={ex.id}>
                <span className="exercise-num">{i+1}</span>
                <div className="color-dot" style={{background:color}}/>
                <span className="exercise-row-name">{ex.name}</span>
                <span style={{fontFamily:"DM Mono",fontSize:9,color:ex.metric==="time"?"#4D9FFF":"var(--muted)",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:4,padding:"1px 5px",letterSpacing:0.5}}>{ex.metric==="time"?"TIME":"WEIGHT"}</span>
                <div className="reorder-btns">
                  <button className="reorder-btn" disabled={i===0} onClick={()=>moveExercise(i,-1)}>▲</button>
                  <button className="reorder-btn" disabled={i===exercises.length-1} onClick={()=>moveExercise(i,1)}>▼</button>
                </div>
                <button onClick={()=>setExercises(exercises.filter(e=>e.id!==ex.id))} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:18,lineHeight:1,padding:"0 4px"}}>×</button>
              </div>
            ))}
          </div>
          <div style={{marginBottom:8}}>
            <label className="form-label">Metric</label>

              <button className={`metric-btn ${newMetric==="time"?"active":""}`}   onClick={()=>setNewMetric("time")}>⏱ Time</button>
            </div>
          </div>
          <div className="form-row" style={{alignItems:"flex-end"}}>
            <div className="form-group" style={{marginBottom:0}}>
              <input className="form-input" placeholder="Exercise name…" value={newEx} onChange={e=>setNewEx(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addExercise()}/>
            </div>
            <button className="btn btn-ghost btn-sm" style={{height:42,flexShrink:0}} onClick={addExercise}>Add</button>

          <div className="row-actions">
            <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>Cancel</button>
            <button className="btn" style={{flex:1}} onClick={()=>{if(!name.trim())return; onSave({id:initial?.id,name:name.trim(),emoji,color,exercises});}}>Save</button>

  function TemplatePicker({ templates, onPick, onClose }) {

                <span style={{fontSize:22}}>{t.emoji}</span>

                  <div style={{fontWeight:600,fontSize:15}}>{t.name}</div>

  // ── Workout Modal ──────────────────────────────────────────────────────
  function WorkoutModal({ templates, templateId, editLog, onSave, onClose }) {
    const today = localDateStr();
    const tmpl  = templates.find(t=>t.id===templateId)||templates[0];

    // Initialise from draft (autosave) or editLog or fresh
    const initState = () => {
      if (editLog) return { date: editLog.date, exercises: editLog.exercises, notes: editLog.notes||"" };
      try {
        const draft = JSON.parse(localStorage.getItem(LS_DRAFT)||"null");
        if (draft && draft.templateId === templateId) return { date: draft.date||today, exercises: draft.exercises||[], notes: draft.notes||"" };
      } catch {}
      return { date: today, exercises: [], notes: "" };
    };

    const init = initState();
    const [date,       setDate]       = useState(init.date);
    const [exercises,  setExercises]  = useState(init.exercises);
    const [notes,      setNotes]      = useState(init.notes);
    const [customName,   setCustomName]   = useState("");
    const [customMetric, setCustomMetric] = useState("weight");
    const [showCustom,   setShowCustom]   = useState(false);
    const [draftSaved, setDraftSaved] = useState(false);

    const blankSet = (metric) => metric==="time" ? {mins:"",secs:""} : {weight:"",reps:""};

    // Autosave draft to localStorage on every change
    useEffect(() => {
      if (editLog) return;
      const draft = { templateId, date, exercises, notes, savedAt: Date.now() };
      localStorage.setItem(LS_DRAFT, JSON.stringify(draft));
      setDraftSaved(true);
      const t = setTimeout(()=>setDraftSaved(false), 1200);
      return ()=>clearTimeout(t);
    }, [date, exercises, notes]);

    const clearDraft = () => localStorage.removeItem(LS_DRAFT);

    const addExercise = (ex) => setExercises(p=>[...p, {...ex, id:ex.id+"-"+uid(), sets:[blankSet(ex.metric||"weight")]}]);
    const addCustomExercise = () => {
      const name = customName.trim(); if(!name) return;
      setExercises(p=>[...p, {id:uid(), name, metric:customMetric, sets:[blankSet(customMetric)]}]);
      setCustomName(""); setCustomMetric("weight"); setShowCustom(false);
    };
    const removeExercise = ei => setExercises(p=>p.filter((_,i)=>i!==ei));
    const updateSet = (ei,si,f,v) => setExercises(p=>p.map((ex,i)=>i!==ei?ex:{...ex,sets:ex.sets.map((s,j)=>j!==si?s:{...s,[f]:v})}));
    const addSet    = ei => setExercises(p=>p.map((ex,i)=>{ if(i!==ei)return ex; const l=ex.sets[ex.sets.length-1]||{weight:"",reps:""}; return {...ex,sets:[...ex.sets,{...l}]}; }));
    const removeSet = (ei,si) => setExercises(p=>p.map((ex,i)=>i!==ei?ex:{...ex,sets:ex.sets.filter((_,j)=>j!==si)}));

    const handleSave = () => {
      clearDraft();
      onSave({id:editLog?.id||uid(), templateId, date, exercises, notes});
    };

    const handleCancel = () => {
      clearDraft();
      onClose();
    };

    return (
      <div className="screen-overlay">
        {/* Header */}
        <div className="screen-header">
          <div className="screen-header-top">
            <button onClick={handleCancel} className="btn btn-ghost btn-sm">✕ Cancel</button>
            <span className="screen-title">{editLog?"EDIT WORKOUT":"LOG WORKOUT"}</span>
            {draftSaved && !editLog && (
              <span style={{fontFamily:"DM Mono",fontSize:10,color:"#4DFF91",letterSpacing:0.5}}>draft saved</span>
            )}
          </div>
          {/* Locked template badge */}
          <div style={{display:"flex",alignItems:"center",gap:8,paddingBottom:12}}>
            <span style={{fontSize:18}}>{tmpl?.emoji}</span>
            <span style={{fontWeight:600,fontSize:14}}>{tmpl?.name}</span>
            <div className="color-dot" style={{background:tmpl?.color||"#FF4D4D"}}/>
          </div>
        </div>

        {/* Body */}
        <div className="screen-body">
          {/* Date row */}
          <div className="form-group">
            <label className="form-label">Date</label>
            <input className="form-input" type="date" value={date} onChange={e=>setDate(e.target.value)}/>
          </div>

          <div className="divider"/>

          {/* Added exercises */}
          {exercises.length===0 && (
            <div style={{textAlign:"center",padding:"24px 0 8px",color:"var(--muted)",fontSize:13}}>
              No exercises added yet — pick one below
            </div>
          )}
          {exercises.map((ex,ei)=>(
            <div key={ex.id} style={{marginBottom:18}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <div className="color-dot" style={{background:tmpl?.color||"#FF4D4D"}}/>
                <span style={{fontWeight:600,fontSize:14,flex:1}}>{ex.name}</span>
                <button className="btn btn-green btn-sm" onClick={()=>addSet(ei)}>+ Set</button>
                <button onClick={()=>removeExercise(ei)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:20,lineHeight:1,padding:"0 4px"}}>×</button>
              </div>
              <div style={{display:"flex",gap:8,marginBottom:4,paddingLeft:16}}>
                <span className="set-label" style={{flex:"0 0 24px"}}>#</span>
                {ex.metric==="time" ? <>
                  <span className="set-label" style={{flex:1}}>MIN</span>
                  <span className="set-label" style={{flex:1}}>SEC</span>
                </> : <>
                  <span className="set-label" style={{flex:1}}>LBS</span>
                  <span className="set-label" style={{flex:1}}>REPS</span>
                </>}
                <span style={{width:28}}/>
              </div>
              {ex.sets.map((s,si)=>(
                <div className="set-row" key={si}>
                  <span className="set-num">{si+1}</span>
                  {ex.metric==="time" ? <>
                    <input className="set-input" type="number" inputMode="numeric" placeholder="0" value={s.mins||""} onChange={e=>updateSet(ei,si,"mins",e.target.value)}/>
                    <input className="set-input" type="number" inputMode="numeric" placeholder="0" value={s.secs||""} onChange={e=>updateSet(ei,si,"secs",e.target.value)}/>
                  </> : <>
                    <input className="set-input" type="number" inputMode="decimal" placeholder="0" value={s.weight||""} onChange={e=>updateSet(ei,si,"weight",e.target.value)}/>
                    <input className="set-input" type="number" inputMode="numeric" placeholder="0" value={s.reps||""}   onChange={e=>updateSet(ei,si,"reps",e.target.value)}/>
                  </>}
                  <button onClick={()=>removeSet(ei,si)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:20,lineHeight:1,width:28,textAlign:"center"}}>×</button>
                </div>
              ))}
            </div>
          ))}

          <div className="divider"/>

          {/* Exercise picker */}
          <div style={{marginBottom:16}}>
            <label className="form-label">Add Exercise</label>
            <div className="picker-list">
              {(tmpl?.exercises||[]).map(ex=>(
                <div className="picker-item" key={ex.id} onClick={()=>addExercise(ex)}>
                  <div className="color-dot" style={{background:tmpl?.color||"#FF4D4D"}}/>
                  <span className="picker-item-name">{ex.name}</span>
                  <span style={{color:"var(--accent)",fontSize:18,lineHeight:1}}>+</span>
                </div>
              ))}
              {!showCustom ? (
                <div className="picker-item" onClick={()=>setShowCustom(true)}>
                  <span style={{fontSize:14,color:"var(--muted)"}}>✏️</span>
                  <span className="picker-item-name picker-item-custom">Custom / variation…</span>
                  <span style={{color:"var(--accent)",fontSize:18,lineHeight:1}}>+</span>
                </div>
              ) : (
                <div style={{background:"var(--surface2)",border:"1px solid var(--accent)",borderRadius:8,padding:10,display:"flex",flexDirection:"column",gap:8}}>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <input className="form-input" style={{marginBottom:0,flex:1,fontSize:14,padding:"7px 10px"}} placeholder="e.g. Dumbbell Bench Press" value={customName} onChange={e=>setCustomName(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter")addCustomExercise(); if(e.key==="Escape"){setShowCustom(false);setCustomName("");} }} autoFocus/>
                    <button onClick={()=>{setShowCustom(false);setCustomName("");setCustomMetric("weight");}} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:18,lineHeight:1,padding:"0 2px"}}>×</button>
                  </div>
                  <div className="metric-toggle">
                    <button className={`metric-btn ${customMetric==="weight"?"active":""}`} onClick={()=>setCustomMetric("weight")}>⚖ Weight + Reps</button>
                    <button className={`metric-btn ${customMetric==="time"?"active":""}`}   onClick={()=>setCustomMetric("time")}>⏱ Time</button>
                  </div>
                  <button className="btn btn-green btn-sm" style={{alignSelf:"flex-end"}} onClick={addCustomExercise}>Add</button>
                </div>
              )}
            </div>
          </div>

          <div className="divider"/>

          {/* Notes */}
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">Notes</label>
            <textarea className="notes-area" placeholder="How did it feel? Any PRs? Notes for next time…" value={notes} onChange={e=>setNotes(e.target.value)}/>
          </div>
        </div>

        {/* Footer */}
        <div className="screen-footer">
          <button className="btn btn-ghost" style={{flex:1}} onClick={handleCancel}>Cancel</button>
          <button className="btn" style={{flex:2}} onClick={handleSave}>Save Workout</button>
        </div>
      </div>
    );
  }

  // ── Helpers ────────────────────────────────────────────────────────────
  function localDateStr(d) {
    // Returns YYYY-MM-DD in the user's local timezone (handles EDT/EST correctly)
    const date = d || new Date();
    return date.toLocaleDateString("en-CA"); // en-CA gives YYYY-MM-DD format
  }

  function formatDate(iso) {
    const d = new Date(iso+"T00:00:00"); // local midnight
    const todayStr     = localDateStr();
    const yest         = new Date(); yest.setDate(yest.getDate()-1);
    const yesterdayStr = localDateStr(yest);
    if (iso===todayStr)     return "Today";
    if (iso===yesterdayStr) return "Yesterday";
    return d.toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"});
  }

  // ── Main App ───────────────────────────────────────────────────────────
  function App() {
    const [token, setToken] = useState(()=>localStorage.getItem(LS_TOKEN)||"");
    const [repo,  setRepo]  = useState(()=>localStorage.getItem(LS_REPO)||"");
    const ready = !!(token && repo);

    const [templates, setTemplates] = useState(SAMPLE_TEMPLATES);
    const [logs,      setLogs]      = useState([]);
    const shaRef = useRef(null);

    // 'loading' | 'synced' | 'saving' | 'error'
    const [syncStatus, setSyncStatus] = useState("loading");
    const [syncError,  setSyncError]  = useState("");

    const [tab,             setTab]             = useState("log");
    const [templateModal,   setTemplateModal]   = useState(null);
    const [templatePicker,  setTemplatePicker]  = useState(false);
    const [workoutModal,    setWorkoutModal]    = useState(null); // {templateId, editLog?}
    const [viewLog,         setViewLog]         = useState(null);

    // Check for an autosaved draft on load and offer to resume
    const [resumeDraft, setResumeDraft] = useState(()=>{
      try {
        const d = JSON.parse(localStorage.getItem(LS_DRAFT)||"null");
        return (d && d.exercises && d.exercises.length > 0) ? d : null;
      } catch { return null; }
    });

    // Load on mount / after setup
    const loadFromGitHub = useCallback(() => {
      if (!token || !repo) return;
      setSyncStatus("loading"); setSyncError("");
      ghRead(repo, token)
        .then(result => {
          if (result) {
            setTemplates(result.content.templates || SAMPLE_TEMPLATES);
            setLogs(result.content.logs || []);
            shaRef.current = result.sha;
          }
          setSyncStatus("synced");
        })
        .catch(e => { setSyncStatus("error"); setSyncError(e.message); });
    }, [token, repo]);

    useEffect(() => { if (ready) loadFromGitHub(); }, [ready]);

    const persist = useCallback(async (newTemplates, newLogs) => {
      setSyncStatus("saving"); setSyncError("");
      try {
        const newSha = await ghWrite(repo, token, { templates:newTemplates, logs:newLogs }, shaRef.current);
        shaRef.current = newSha;
        setSyncStatus("synced");
      } catch(e) { setSyncStatus("error"); setSyncError(e.message); }
    }, [repo, token]);

    const saveTemplates = t => { setTemplates(t); persist(t, logs); };
    const saveLogs      = l => { setLogs(l);      persist(templates, l); };

    const handleSaveTemplate = tmpl => {
      const updated = tmpl.id && templates.find(t=>t.id===tmpl.id)
        ? templates.map(t=>t.id===tmpl.id?tmpl:t)
        : [...templates,{...tmpl,id:uid()}];
      saveTemplates(updated); setTemplateModal(null);
    };

    const handleSaveWorkout = workout => {
      const updated = workout.id && logs.find(l=>l.id===workout.id)
        ? logs.map(l=>l.id===workout.id?workout:l)
        : [workout,...logs];
      saveLogs(updated);
      setWorkoutModal(null);
      setResumeDraft(null);
    };

    const grouped    = logs.reduce((a,l)=>{ (a[l.date]||(a[l.date]=[])).push(l); return a; }, {});
    const sortedDates = Object.keys(grouped).sort((a,b)=>b.localeCompare(a));

    const syncColor = {loading:"#FFD34D",saving:"#FFD34D",synced:"#4DFF91",error:"#FF4D4D"}[syncStatus];
    const syncLabel = {loading:"Loading",saving:"Saving…",synced:"Synced",error:"Error"}[syncStatus];

    if (!ready) {
      return <SetupScreen onComplete={(t,r)=>{ setToken(t); setRepo(r); }}/>;
    }

    return (
      <>
        <div className="app">
          {/* Header */}
          <div className="header">
            <div className="header-top">
              <h1>IRON LOG</h1>
              <span className="header-sub">v2</span>
              <div className="sync-pill" style={{color:syncColor}}>
                <div className="sync-dot" style={{background:syncColor}}/>
                {syncLabel}
              </div>
            </div>
            {syncStatus==="error" && (
              <div style={{fontFamily:"DM Mono",fontSize:10,color:"#FF6B6B",paddingBottom:6,letterSpacing:0.3,lineHeight:1.4}}>
                ⚠ {syncError}
              </div>
            )}
            <div className="nav">
              <button className={`nav-btn ${tab==="log"?"active":""}`}       onClick={()=>setTab("log")}>Workouts</button>
              <button className={`nav-btn ${tab==="templates"?"active":""}`} onClick={()=>setTab("templates")}>Templates</button>
              <button className={`nav-btn ${tab==="settings"?"active":""}`}  onClick={()=>setTab("settings")}>Settings</button>
            </div>
          </div>

          <div className="content">

            {/* ── Templates ── */}
            {tab==="templates" && <>
              <div className="section-header">
                <span className="section-title">MY TEMPLATES</span>
                <button className="btn btn-sm" onClick={()=>setTemplateModal({mode:"new"})}>+ NEW</button>
              </div>
              {templates.length===0 && <div className="empty"><div className="empty-icon">📋</div><div className="empty-title">No Templates Yet</div><div className="empty-sub">Tap + NEW to create one</div></div>}
              {templates.map(tmpl=>(
                <div className="card" key={tmpl.id}>
                  <div className="card-header">
                    <span className="card-emoji">{tmpl.emoji}</span>
                    <span className="card-title">{tmpl.name}</span>
                    <span className="card-badge">{tmpl.exercises.length} exercises</span>
                  </div>
                  <div className="exercise-list">
                    {tmpl.exercises.map((ex,i)=>(
                      <div className="exercise-row" key={ex.id}>
                        <span className="exercise-num">{i+1}</span>
                        <div className="color-dot" style={{background:tmpl.color}}/>
                        <span className="exercise-row-name">{ex.name}</span>
                      </div>
                    ))}
                  </div>
                  <div className="divider"/>
                  <div className="row-actions">
                    <button className="btn btn-ghost btn-sm" onClick={()=>setTemplateModal({mode:"edit",data:tmpl})}>Edit</button>
                    <button className="btn btn-ghost btn-sm" onClick={()=>setWorkoutModal({templateId:tmpl.id})}>Start</button>
                    <button className="btn btn-danger btn-sm" onClick={()=>saveTemplates(templates.filter(t=>t.id!==tmpl.id))}>Delete</button>
                  </div>
                </div>
              ))}
            </>}

            {/* ── Log ── */}
            {tab==="log" && <>
              <div className="section-header">
                <span className="section-title">WORKOUT LOG</span>
                {templates.length>0 && <button className="btn btn-sm" onClick={()=>setWorkoutModal({templateId:templates[0].id})}>+ LOG</button>}
              </div>
              {syncStatus==="loading" && (
                <div className="empty">
                  <div className="empty-icon"><span className="spinner" style={{width:40,height:40,borderWidth:3}}/></div>
                  <div className="empty-title" style={{marginTop:16}}>Loading…</div>
                  <div className="empty-sub">Fetching your data from GitHub</div>
                </div>
              )}
              {syncStatus!=="loading" && sortedDates.length===0 && (
                <div className="empty"><div className="empty-icon">🏋️</div><div className="empty-title">No Workouts Yet</div><div className="empty-sub">Tap + LOG or start from a template</div></div>
              )}
              {sortedDates.map(date=>(
                <div className="log-entry" key={date}>
                  <div className="log-date">{formatDate(date)}</div>
                  {grouped[date].map(log=>{
                    const tmpl=templates.find(t=>t.id===log.templateId);
                    const open=viewLog===log.id;
                    return (
                      <div className="log-card" key={log.id}>
                        <div className="log-card-header" onClick={()=>setViewLog(open?null:log.id)}>
                          <div className="color-bar" style={{background:tmpl?.color||"#666"}}/>
                          <span style={{fontSize:18}}>{tmpl?.emoji||"🏋️"}</span>
                          <span style={{flex:1,fontWeight:600,fontSize:15}}>{tmpl?.name||"Workout"}</span>
                          <span style={{fontFamily:"DM Mono",fontSize:11,color:"var(--muted)"}}>{log.exercises?.length||0} ex</span>
                          <span style={{color:"var(--muted)",marginLeft:8,fontSize:12}}>{open?"▲":"▼"}</span>
                        </div>
                        {open && (
                          <div className="log-card-body">
                            {(log.exercises||[]).map(ex=>(
                              <div key={ex.id}>
                                <div className="log-exercise-name">{ex.name}</div>
                                <div className="log-sets">
                                  {(ex.sets||[]).map((s,i)=>{
                                    const chip = ex.metric==="time"
                                      ? `${s.mins||0}:${String(s.secs||0).padStart(2,"0")}`
                                      : `${s.weight}lbs × ${s.reps}`;
                                    return <span className="log-set-chip" key={i}>{chip}</span>;
                                  })}
                                  {(!ex.sets||!ex.sets.length)&&<span style={{fontSize:12,color:"var(--muted)"}}>No sets logged</span>}
                                </div>
                              </div>
                            ))}
                            {log.notes ? <>
                              <div style={{fontFamily:"DM Mono",fontSize:10,letterSpacing:1,textTransform:"uppercase",color:"var(--muted)"}}>Notes</div>
                              <div className="notes-display">{log.notes}</div>
                            </> : null}
                            <div className="row-actions" style={{marginTop:4}}>
                              <button className="btn btn-ghost btn-sm" onClick={()=>setWorkoutModal({templateId:log.templateId,editLog:log})}>Edit</button>
                              <button className="btn btn-danger btn-sm" onClick={()=>{saveLogs(logs.filter(l=>l.id!==log.id));setViewLog(null);}}>Delete</button>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              ))}
            </>}

            {/* ── Settings ── */}
            {tab==="settings" && <>
              <div className="section-header"><span className="section-title">SETTINGS</span></div>
              <div className="card">
                <div className="card-header"><span style={{fontSize:20}}>☁️</span><span className="card-title">GitHub Storage</span></div>
                <div style={{fontSize:13,color:"#AAA",marginBottom:4,lineHeight:1.7}}>
                  Repo: <strong style={{color:"var(--text)"}}>{repo}</strong><br/>
                  File: <code style={{fontFamily:"DM Mono",fontSize:12,background:"var(--surface2)",padding:"1px 5px",borderRadius:4,color:"var(--text)"}}>{DATA_FILE}</code>
                </div>
                <div style={{fontSize:12,color:"var(--muted)",marginBottom:14,lineHeight:1.5}}>
                  All data is stored as plain JSON in your repo. You can view or edit it directly on GitHub.
                </div>
                <div className="row-actions">
                  <button className="btn btn-ghost btn-sm" onClick={loadFromGitHub}>↻ Sync now</button>
                  <button className="btn btn-danger btn-sm" onClick={()=>{
                    if(window.confirm("Disconnect? Your data file stays in GitHub. You'll need to re-enter your token next time.")) {
                      localStorage.removeItem(LS_TOKEN); localStorage.removeItem(LS_REPO); setToken(""); setRepo("");
                    }
                  }}>Disconnect</button>
                </div>
              </div>
              <div className="card">
                <div className="card-header"><span style={{fontSize:20}}>📖</span><span className="card-title">How to Update This App</span></div>
                <div style={{fontSize:13,color:"#AAA",lineHeight:1.7}}>
                  <div style={{marginBottom:8}}>To update Iron Log with a new version of the HTML file:</div>
                  <div className="setup-step"><span className="setup-step-num">1</span><span>Get the new <code style={{fontFamily:"DM Mono",fontSize:12,background:"var(--surface2)",padding:"1px 5px",borderRadius:4,color:"var(--text)"}}>iron-log.html</code> file</span></div>
                  <div className="setup-step"><span className="setup-step-num">2</span><span>Go to your GitHub repo and click on <code style={{fontFamily:"DM Mono",fontSize:12,background:"var(--surface2)",padding:"1px 5px",borderRadius:4,color:"var(--text)"}}>index.html</code></span></div>
                  <div className="setup-step"><span className="setup-step-num">3</span><span>Click the pencil (Edit) icon → then click the upload icon to replace the file</span></div>
                  <div className="setup-step"><span className="setup-step-num">4</span><span>Commit the change. GitHub Pages will redeploy in ~1 minute.</span></div>
                  <div className="setup-step"><span className="setup-step-num">5</span><span>Hard-refresh the app on your phone: hold the reload button in Safari and tap "Reload Without Content Blockers", or remove and re-add from home screen.</span></div>
                </div>
              </div>
            </>}

          </div>

          {tab==="log"       && templates.length>0 && <button className="fab" onClick={()=>setTemplatePicker(true)}>+</button>}
          {tab==="templates"                        && <button className="fab" onClick={()=>setTemplateModal({mode:"new"})}>+</button>}
        </div>

        {/* Resume draft banner */}
        {resumeDraft && !workoutModal && (
          <div style={{position:"fixed",bottom:"calc(90px + env(safe-area-inset-bottom,0px))",left:"50%",transform:"translateX(-50%)",width:"calc(100% - 40px)",maxWidth:390,background:"#1A2A1A",border:"1px solid #2A5A2A",borderRadius:12,padding:"12px 14px",zIndex:150,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18}}>💾</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600,color:"#4DFF91"}}>Draft workout saved</div>
              <div style={{fontSize:11,color:"var(--muted)"}}>You have an unfinished workout</div>
            </div>
            <button className="btn btn-green btn-sm" onClick={()=>{ setWorkoutModal({templateId:resumeDraft.templateId}); setResumeDraft(null); }}>Resume</button>
            <button onClick={()=>{ localStorage.removeItem(LS_DRAFT); setResumeDraft(null); }} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
          </div>
        )}

        {templateModal   && <TemplateModal initial={templateModal.data} onSave={handleSaveTemplate} onClose={()=>setTemplateModal(null)}/>}
        {templatePicker  && <TemplatePicker templates={templates} onPick={id=>{ setTemplatePicker(false); setWorkoutModal({templateId:id}); }} onClose={()=>setTemplatePicker(false)}/>}
        {workoutModal    && <WorkoutModal templates={templates} templateId={workoutModal.templateId} editLog={workoutModal.editLog} onSave={handleSaveWorkout} onClose={()=>{ setWorkoutModal(null); }}/>}
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
